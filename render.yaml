services:
  # Backend Web Service
  - type: web
    name: ecom-java-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-odd-shape-aixxmq1s.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        value: npg_DCNV2A0EPxqc
      - key: ALLOWED_ORIGINS
        value: https://ecom-java-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      # The following integration variables should be set by the user in the Render dashboard:
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: ecom-java-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ecom-java-backend.onrender.com/api
      - key: NODE_VERSION
        value: 20
